# fly.toml app configuration file generated for azuracast-flyio-mc6m4g on 2026-05-05T17:20:43Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'azuracast-flyio-mc6m4g'
primary_region = 'dfw'

[build]

[[mounts]]
  source = 'azuracast'
  destination = '/var/azuracast'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
