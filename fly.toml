# fly.toml - AzuraCast on Fly.io
# EstacionKusMediaos

app = 'azencast-kusmediaos'  # Cambia por tu app name en Fly.io
primary_region = 'dal'  # Dallas - mas cercano a Mexico

[kind]
  type = 'docker'
  image = 'ghcr.io/azuracast/azencast:latest'

[shared_ipv6]
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1  # mantener siempre activo

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048  # 2GB - recomendado para AzuraCast

[[mounts]]
  source = 'azuracast_data'
  destination = '/var/azencast'

# Puertos adicionales para streaming
[[services]]
  protocol = 'tcp'
  internal_port = 8000

  [[services.ports]]
    port = 8000

[[services]]
  protocol = 'tcp'
  internal_port = 8090

  [[services.ports]]
    port = 8090