app = "azuracast-flyio"
primary_region = "mia"

[build]
  image = "ghcr.io/azuracast/azuracast:latest"

[env]
  APP_ENV = "production"
  AZURACAST_HTTP_PORT = "80"
  AZURACAST_HTTPS_PORT = "443"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 8000

[[mounts]]
  source = "azuracast_data"
  destination = "/var/azuracast"

[machines]
  memory = "2048"
  cpus = 2
