# fly.toml - AzuraCast on Fly.io
# VM: performance-2x (2 CPUs, 4GB RAM)

app = 'azuracast-flyio'
primary_region = 'iad'

[build]
  dockerfile = "Dockerfile"

[processes]
  app = "/usr/local/bin/my_init --no-main-command"

[[mounts]]
  source = 'azuracast'
  destination = '/var/azuracast'

# Puerto web
[[services]]
  internal_port = 80
  protocol = "tcp"
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

# Stream Icecast HTTP
[[services]]
  internal_port = 8000
  protocol = "tcp"
  processes = ['app']

  [[services.ports]]
    port = 8000

# Stream Icecast HTTPS
[[services]]
  internal_port = 8443
  protocol = "tcp"
  processes = ['app']

  [[services.ports]]
    port = 8443

# SFTP
[[services]]
  internal_port = 2022
  protocol = "tcp"
  processes = ['app']

  [[services.ports]]
    port = 2022

[[vm]]
  size = 'performance-2x'
  memory = '4gb'
  memory_mb = 4096
