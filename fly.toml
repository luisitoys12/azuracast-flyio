# fly.toml - AzuraCast on Fly.io
# Fixed: memory 2GB, ports 8000/8443, auto_stop off

app = 'azuracast-flyio'
primary_region = 'iad'

[build]

[[mounts]]
  source = 'azuracast'
  destination = '/var/azuracast'

# Puerto web (80 -> 443)
[[services]]
  internal_port = 80
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

# Puerto stream Icecast HTTP
[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 8000

# Puerto stream Icecast HTTPS
[[services]]
  internal_port = 8443
  protocol = "tcp"

  [[services.ports]]
    port = 8443

# SFTP para subir archivos de música
[[services]]
  internal_port = 2022
  protocol = "tcp"

  [[services.ports]]
    port = 2022

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
